<!-- Natija modal — sendCalc() tomonidan boshqariladi -->
<div class="rm-overlay" id="rm-overlay" onclick="closeResult(event)">
    <div class="rm" onclick="event.stopPropagation()">
        <div class="rm-hdr">
            <div class="rm-ic">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <path d="M9 12L11 14L15 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                          stroke-linejoin="round"/>
                    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
                </svg>
            </div>
            <h2>Hisob-kitob tayyor</h2>
            <p id="rm-sub">—</p>
        </div>

        <!-- Umumiy narx -->
        <div class="rm-total">
            <div class="rm-total-l">Umumiy narx</div>
            <div class="rm-total-v" id="rm-total">0 <small>so'm</small></div>
        </div>

        <!-- Tafsilotlar -->
        <div class="rm-body">
            <!-- Profnastil qoplama -->
            <div class="rm-row">
                <div class="rm-row-l">
                    <div class="rm-row-ic cov">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path d="M3 9L12 4L21 9V20H3V9Z" stroke="currentColor" stroke-width="1.5"
                                  stroke-linejoin="round"/>
                            <path d="M9 20V14H15V20" stroke="currentColor" stroke-width="1.5"
                                  stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div>
                        <div class="rm-row-n">Profnastil qoplama</div>
                        <div class="rm-row-d">Material + kesish/bukish</div>
                    </div>
                </div>
                <div class="rm-row-v" id="rm-covering">—</div>
            </div>

            <!-- Yog'och konstruktsiya -->
            <div class="rm-row">
                <div class="rm-row-l">
                    <div class="rm-row-ic str">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path d="M4 20L8 4H16L20 20" stroke="currentColor" stroke-width="1.5"
                                  stroke-linejoin="round"/>
                            <path d="M6 14H18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div>
                        <div class="rm-row-n">Yog'och konstruktsiya</div>
                        <div class="rm-row-d">Stropila, obreshotka, ustun</div>
                    </div>
                </div>
                <div class="rm-row-v" id="rm-structure">—</div>
            </div>

            <!-- Aksessuarlar -->
            <div class="rm-row">
                <div class="rm-row-l">
                    <div class="rm-row-ic hlp">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M12 2V6M12 18V22M2 12H6M18 12H22" stroke="currentColor" stroke-width="1.5"
                                  stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div>
                        <div class="rm-row-n">Aksessuarlar</div>
                        <div class="rm-row-d">Shurup, germetik, duga</div>
                    </div>
                </div>
                <div class="rm-row-v" id="rm-helpers">—</div>
            </div>

            <!-- Usta haqqi -->
            <div class="rm-row">
                <div class="rm-row-l">
                    <div class="rm-row-ic lab">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path d="M16 7C16 9.21 14.21 11 12 11C9.79 11 8 9.21 8 7C8 4.79 9.79 3 12 3C14.21 3 16 4.79 16 7Z"
                                  stroke="currentColor" stroke-width="1.5"/>
                            <path d="M4 21V19C4 16.79 7.58 15 12 15C16.42 15 20 16.79 20 19V21"
                                  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div>
                        <div class="rm-row-n">Ish haqi</div>
                        <div class="rm-row-d">Tom yopish xizmati</div>
                    </div>
                </div>
                <div class="rm-row-v" id="rm-labor">—</div>
            </div>
        </div>

        <!-- Eslatma -->
        <div class="rm-info">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.2"/>
                <path d="M8 5V8.5M8 10.5V11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            Narxlar taxminiy. Aniq narx uchun operator bilan bog'laning.
        </div>

        <!-- Tugmalar -->
        <div class="rm-ftr">
            <button class="rm-btn rm-btn-s" onclick="closeResult()">Yopish</button>
            <a href="tel:+998882606666" class="rm-btn rm-btn-p" id="rm-call">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M5.5 1.5H3C2.17 1.5 1.5 2.17 1.5 3C1.5 8.25 5.75 12.5 11 12.5C11.83 12.5 12.5 11.83 12.5 11V8.5L9.5 7.5L8 9C6.58 8.23 5.27 6.92 4.5 5.5L6 4L5.5 1.5Z"
                          stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
                </svg>
                Qo'ng'iroq
            </a>
        </div>
    </div>
</div>
