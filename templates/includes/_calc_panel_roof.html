<div class="rpn vis" data-t="roof">
    <div class="rpn-h"><h3>Tom turi</h3></div>
    <div class="rw">
        <div class="rg" style="grid-template-columns:repeat(3,1fr)">
            <button class="rf" data-r="shed" onclick="setRoof('shed')">
                <div class="rf-i">
                    <svg viewBox="0 0 52 32" fill="none">
                        <rect x="4" y="20" width="44" height="8" fill="rgba(34,197,94,.03)"
                              stroke="currentColor" stroke-width="1.4" rx="1"/>
                        <polygon points="4,8 48,20 4,20" fill="rgba(34,197,94,.05)" stroke="currentColor"
                                 stroke-width="2"/>
                    </svg>
                </div>
                <span>Bir tomonli</span>
            </button>
            <button class="rf on" data-r="gable" onclick="setRoof('gable')">
                <div class="rf-i">
                    <svg viewBox="0 0 52 32" fill="none">
                        <rect x="4" y="20" width="44" height="8" fill="rgba(34,197,94,.03)"
                              stroke="currentColor" stroke-width="1.4" rx="1"/>
                        <polygon points="4,20 26,4 48,20" fill="rgba(34,197,94,.05)" stroke="currentColor"
                                 stroke-width="2"/>
                    </svg>
                </div>
                <span>Ikki tomonli</span>
            </button>
            <button class="rf" data-r="doppili" onclick="setRoof('doppili')">
                <div class="rf-i">
                    <svg viewBox="0 0 52 32" fill="none">
                        <rect x="4" y="20" width="44" height="8" fill="rgba(34,197,94,.03)"
                              stroke="currentColor" stroke-width="1.4" rx="1"/>
                        <polygon points="4,20 10,10 22,5 30,5 42,10 48,20" fill="rgba(34,197,94,.05)"
                                 stroke="currentColor" stroke-width="2"/>
                        <line x1="22" y1="5" x2="30" y2="5" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                </div>
                <span>Do'ppili</span>
            </button>
        </div>
    </div>
</div>
