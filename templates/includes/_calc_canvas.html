<div class="cvw" id="cwrap">
    <canvas id="cv"></canvas>
    <div class="cv-area" id="cv-area">0.00 m²</div>
    <div class="cv-z">
        <button class="zb" onclick="zoomIn()">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M9 4V14M4 9H14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
        </button>
        <button class="zb" onclick="zoomOut()">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M4 9H14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
        </button>
        <button class="zb" onclick="resetView()">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                <path d="M2 8C2 4.69 4.69 2 8 2C11.31 2 14 4.69 14 8C14 11.31 11.31 14 8 14"
                      stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                <path d="M2 4V8H6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"
                      stroke-linejoin="round"/>
            </svg>
        </button>
        <!-- Ajratgich chiziq -->
        <div style="width:100%;height:1px;background:rgba(34,197,94,.12);margin:2px 0"></div>

        <!-- O'chirish tugmasi -->
        <button class="zb zb-del" onclick="delActive()" id="b-del" title="O'chirish">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M3 4.5H13M6.5 7V11.5M9.5 7V11.5" stroke="currentColor" stroke-width="1.2"
                      stroke-linecap="round"/>
                <path d="M4.5 4.5L5 13H11L11.5 4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"
                      stroke-linejoin="round"/>
                <path d="M6.5 4.5V3C6.5 2.45 6.95 2 7.5 2H8.5C9.05 2 9.5 2.45 9.5 3V4.5" stroke="currentColor"
                      stroke-width="1.2" stroke-linecap="round"/>
            </svg>
        </button>
    </div>
    <button class="rp-toggle" id="rp-toggle" onclick="togglePanel()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1.5" y="1.5" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.2"/>
            <path d="M10 1.5V14.5" stroke="currentColor" stroke-width="1.2"/>
        </svg>
        <span>Yopish</span>
    </button>
    <div class="cv-hint" id="cv-hint">
        <div class="cv-hint-in">
            <div class="hi">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>
            <p>Uy shaklini chizing</p>
            <span>1 barmoq = chizish · 2 barmoq = zoom/pan</span>
        </div>
    </div>

    {# Canvas tutorial — step-by-step, template ichida #}
    <template id="cv-tut-tpl">
        <div class="cv-tut" id="cv-tut">
            <div class="cv-tut-bg" onclick="closeTut()"></div>
            <svg class="cv-tut-svg" viewBox="0 0 300 240" fill="none">

                {# Step 1: A nuqta #}
                <circle class="tut-el tut-pulse" data-s="1" cx="70" cy="60" r="8"/>
                <circle class="tut-el tut-dot" data-s="1" cx="70" cy="60" r="5"/>
                <text class="tut-el tut-label" data-s="1" x="56" y="54">A</text>

                {# Step 2: B nuqta + A-B chiziq #}
                <line class="tut-el tut-line" data-s="2" x1="70" y1="60" x2="230" y2="60"/>
                <circle class="tut-el tut-pulse" data-s="2" cx="230" cy="60" r="8"/>
                <circle class="tut-el tut-dot" data-s="2" cx="230" cy="60" r="5"/>
                <text class="tut-el tut-label" data-s="2" x="236" y="54">B</text>

                {# Step 3: C nuqta + B-C chiziq #}
                <line class="tut-el tut-line" data-s="3" x1="230" y1="60" x2="230" y2="180"/>
                <circle class="tut-el tut-pulse" data-s="3" cx="230" cy="180" r="8"/>
                <circle class="tut-el tut-dot" data-s="3" cx="230" cy="180" r="5"/>
                <text class="tut-el tut-label" data-s="3" x="236" y="196">C</text>

                {# Step 4: D nuqta + C-D chiziq #}
                <line class="tut-el tut-line" data-s="4" x1="230" y1="180" x2="70" y2="180"/>
                <circle class="tut-el tut-pulse" data-s="4" cx="70" cy="180" r="8"/>
                <circle class="tut-el tut-dot" data-s="4" cx="70" cy="180" r="5"/>
                <text class="tut-el tut-label" data-s="4" x="56" y="196">D</text>

                {# Step 5: D-A yopish chiziq #}
                <line class="tut-el tut-line" data-s="5" x1="70" y1="180" x2="70" y2="60"/>
                <circle class="tut-el tut-pulse" data-s="5" cx="70" cy="60" r="8"/>

                {# Step 6: Arc — tepki chiziqni egri qilish #}
                <path class="tut-el tut-arc" data-s="6" d="M70 60 Q150 20 230 60"/>
                <line class="tut-el tut-hide" data-s="6" x1="70" y1="60" x2="230" y2="60"/>
                <circle class="tut-el tut-handle" data-s="6" cx="150" cy="28" r="7"/>

                {# Kursor (har step da JS orqali pozitsiya o'zgaradi) #}
                <g class="tut-cursor" id="tut-cursor">
                    <circle r="14" fill="rgba(34,197,94,.12)" stroke="rgba(34,197,94,.5)" stroke-width="1.5"/>
                    <circle r="6" fill="rgba(34,197,94,.85)"/>
                    <circle r="2.5" fill="#fff"/>
                </g>
            </svg>

            {# Matn va navigatsiya #}
            <div class="cv-tut-info">
                <div class="cv-tut-counter" id="tut-counter">1 / 6</div>
                <div class="cv-tut-msg" id="tut-msg">Bosib nuqta qo'ying</div>
            </div>
            <div class="cv-tut-nav">
                <button class="cv-tut-prev" id="tut-prev-btn" onclick="tutPrev()" style="display:none">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M15 19L8 12L15 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                              stroke-linejoin="round"/>
                    </svg>
                    Orqaga
                </button>
                <button class="cv-tut-next" id="tut-next-btn" onclick="tutNext()">
                    Keyingi
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M9 5L16 12L9 19" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                              stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <button class="cv-tut-skip" onclick="closeTut()">O'tkazib yuborish</button>
        </div>
    </template>
</div>
