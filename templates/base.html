{% load static %}
<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport"
          content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
    <meta name="theme-color" content="#080c14" id="meta-theme-color"/>
    <title>TOM — Tom Markazi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}?v=1.1.1">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    {# FOUC oldini olish: sahifa renderdan oldin theme ni qo'llash #}
    <script>
        (function() {
            var t = localStorage.getItem('promet-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
            var m = document.getElementById('meta-theme-color');
            if (m) m.content = t === 'light' ? '#f8fafc' : '#080c14';
        })();

        // ← shu yerga qo'shamiz — DOM yuklanmasdan oldin height o'rnatiladi
        (function() {
            function setVH() {
                var h = (window.visualViewport?.height || window.innerHeight) * 0.01;
                document.documentElement.style.setProperty('--vh', h + 'px');
            }
            setVH();
            window.visualViewport?.addEventListener('resize', setVH);
            window.addEventListener('resize', setVH);
        })();
    </script>
</head>
<body>

{% include 'includes/_header.html' %}

{% block content %}{% endblock %}

<script src="{% static 'js/config.js' %}?v=1.1.1"></script>
<script src="{% static 'js/telegram.js' %}?v=1.1.1"></script>
<script src="{% static 'js/utils.js' %}?v=1.1.1"></script>
<script src="{% static 'js/canvas.js' %}?v=1.1.1"></script>
<script src="{% static 'js/shapes.js' %}?v=1.1.1"></script>
<script src="{% static 'js/events.js' %}?v=1.1.1"></script>
<script src="{% static 'js/calc.js' %}?v=1.1.1"></script>
<script src="{% static 'js/ui.js' %}?v=1.1.1"></script>
<script src="{% static 'js/theme.js' %}?v=1.1.1"></script>
<script src="{% static 'js/wizard.js' %}?v=1.1.1"></script>
<script src="{% static 'js/onboarding.js' %}?v=1.1.1"></script>
<script src="{% static 'js/app.js' %}?v=1.1.1"></script>
</body>
</html>
